<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아파트 매매 급등 레이더</title>
<style>
body{font-family:'Noto Sans KR',sans-serif;background:#f4f1eb;margin:0;padding:0}
.header{background:#1a1814;color:#f4f1eb;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;margin:0}
.status{font-size:11px;padding:4px 10px;border:1px solid #444;border-radius:4px;color:#aaa}
.container{max-width:1200px;margin:0 auto;padding:20px}
.search-box{background:#fff;border:1px solid #ddd;border-radius:4px;padding:20px;margin-bottom:16px;box-shadow:2px 2px 0 #ddd}
.search-box input,.search-box select{padding:8px 12px;border:1px solid #ddd;border-radius:3px;font-size:13px;margin-right:8px}
.btn{background:#c84b2f;color:#fff;border:none;padding:8px 20px;border-radius:3px;font-size:13px;cursor:pointer;font-weight:700}
.btn:hover{background:#a83a22}
.guide{font-size:11px;color:#888;margin-top:8px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.s-card{background:#fff;border:1px solid #ddd;border-radius:4px;padding:14px;box-shadow:2px 2px 0 #ddd}
.s-label{font-size:10px;color:#888;margin-bottom:6px;text-transform:uppercase}
.s-value{font-size:22px;font-weight:900}
.c-red{color:#c84b2f}.c-blue{color:#2f6bc8}.c-green{color:#2a7a4b}.c-gold{color:#b87020}
.chart-box{background:#fff;border:1px solid #ddd;border-radius:4px;padding:20px;margin-bottom:16px;box-shadow:2px 2px 0 #ddd}
.chart-title{font-size:11px;color:#888;text-transform:uppercase;margin-bottom:12px;letter-spacing:1px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-name{font-size:12px;font-weight:700;min-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:#f4f1eb;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;background:#c84b2f;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width 1s ease}
.bar-val{font-size:10px;color:#fff;font-weight:700;white-space:nowrap}
.trend-box{background:#fff;border:1px solid #ddd;border-radius:4px;padding:20px;margin-bottom:16px;box-shadow:2px 2px 0 #ddd}
.month-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.month-tab{padding:6px 14px;border:1px solid #ddd;border-radius:20px;font-size:12px;cursor:pointer;background:#f9f9f9}
.month-tab.active{background:#1a1814;color:#fff;border-color:#1a1814}
.signal-box{background:#1a1814;color:#f4f1eb;border-radius:4px;padding:20px;margin-bottom:16px}
.signal-title{font-size:10px;color:#c84b2f;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.signal-item{background:rgba(255,255,255,0.05);border-left:3px solid #c84b2f;padding:10px 14px;margin-bottom:8px;border-radius:0 4px 4px 0}
.signal-apt{font-weight:700;font-size:14px}
.signal-info{font-size:12px;color:#aaa;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:13px}
.table-wrap{background:#fff;border:1px solid #ddd;border-radius:4px;overflow:hidden;box-shadow:2px 2px 0 #ddd}
.table-header{background:#1a1814;color:#f4f1eb;padding:10px 16px;display:flex;justify-content:space-between;font-size:11px}
th{background:#f9f7f3;padding:9px 12px;text-align:left;font-size:10px;color:#888;border-bottom:1px solid #ddd;text-transform:uppercase}
td{padding:10px 12px;border-bottom:1px solid #eee}
tr:hover td{background:#fafaf8}
.tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:2px;font-weight:700}
.tag-high{background:#fde8e5;color:#c84b2f;border:1px solid #f5c0b8}
.tag-mid{background:#fef3e2;color:#b87020;border:1px solid #f5d89a}
.tag-normal{background:#f0f0f0;color:#888;border:1px solid #ddd}
.loading{text-align:center;padding:40px;color:#888;font-size:13px}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <h1>📊 아파트 매매 급등 레이더</h1>
  <div class="status" id="status">서버 확인 중...</div>
</div>
<div class="container">
  <div class="search-box">
    <div>
      지역코드: <input id="lawdCd" value="26350" style="width:70px">
      기준연월: <input id="dealYmd" value="202504" style="width:70px">
      건수: <select id="numRows"><option value="50">50건</option><option value="100" selected>100건</option><option value="200">200건</option></select>
      <button class="btn" onclick="loadAll()">🔍 전체 분석</button>
    </div>
    <div class="guide">
      📍 주요 지역코드 — 부산 해운대: <b>26350</b> · 수영: <b>26380</b> · 중구: <b>26110</b> · 서울 강남: <b>11680</b> · 마포: <b>11440</b> · 대구 수성: <b>27290</b>
    </div>
  </div>

  <div class="summary" id="summary" style="display:none">
    <div class="s-card"><div class="s-label">총 거래건수</div><div class="s-value c-blue" id="s-total">0</div></div>
    <div class="s-card"><div class="s-label">평균 거래가</div><div class="s-value c-red" id="s-avg">0</div><div style="font-size:11px;color:#888">만원</div></div>
    <div class="s-card"><div class="s-label">최고 거래가</div><div class="s-value c-gold" id="s-max">0</div><div style="font-size:11px;color:#888">만원</div></div>
    <div class="s-card"><div class="s-label">🔴 급등 신호</div><div class="s-value c-green" id="s-signal">0</div><div style="font-size:11px;color:#888">건 감지</div></div>
  </div>

  <div class="signal-box" id="signalBox" style="display:none">
    <div class="signal-title">🚨 급등 신호 감지 — 평균 대비 1.5배 이상</div>
    <div id="signalList"></div>
  </div>

  <div class="chart-box" id="chartBox" style="display:none">
    <div class="chart-title">TOP 10 — 아파트별 최고 거래가 (만원)</div>
    <div id="barChart"></div>
  </div>

  <div class="trend-box" id="trendBox" style="display:none">
    <div class="chart-title">📅 3개월 추세 비교</div>
    <div class="month-tabs" id="monthTabs"></div>
    <div id="trendChart"></div>
  </div>

  <div id="tableWrap">
    <div class="loading">🏢 지역코드와 연월 입력 후 전체 분석 버튼을 눌러주세요</div>
  </div>
</div>

<script>
const SERVER = 'https://web-production-ef2cb.up.railway.app';
let allData = [];
let trendData = {};

async function checkServer() {
  try {
    await fetch(SERVER + '/api/apt?LAWD_CD=26350&DEAL_YMD=202501&numOfRows=1');
    document.getElementById('status').textContent = '🟢 서버 연결됨';
    document.getElementById('status').style.color = '#00c896';
  } catch(e) {
    document.getElementById('status').textContent = '🔴 서버 오프라인';
    document.getElementById('status').style.color = '#ff4455';
  }
}
checkServer();
setInterval(checkServer, 10000);

async function fetchMonth(lawdCd, ym, numRows) {
  const url = `${SERVER}/api/apt?LAWD_CD=${lawdCd}&DEAL_YMD=${ym}&numOfRows=${numRows}`;
  const res = await fetch(url);
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const items = xml.querySelectorAll('item');
  const data = [];
  items.forEach(item => {
    const get = tag => item.querySelector(tag)?.textContent?.trim() || '';
    const price = parseInt(get('dealAmount').replace(/,/g,'')) || 0;
    data.push({
      aptNm: get('aptNm'),
      dealAmount: price,
      dealAmountStr: get('dealAmount'),
      area: parseFloat(get('excluUseAr')||'0').toFixed(1),
      floor: get('floor'),
      dealYear: get('dealYear'),
      dealMonth: get('dealMonth'),
      dealDay: get('dealDay'),
      umdNm: get('umdNm'),
      buildYear: get('buildYear'),
    });
  });
  return data;
}

function getPrevMonths(ym, n) {
  let y = parseInt(ym.substring(0,4));
  let m = parseInt(ym.substring(4,6));
  const months = [];
  for(let i = n-1; i >= 0; i--) {
    let mm = m - i;
    let yy = y;
    while(mm <= 0) { mm += 12; yy--; }
    months.push(yy + String(mm).padStart(2,'0'));
  }
  return months;
}

async function loadAll() {
  const lawdCd = document.getElementById('lawdCd').value.trim();
  const dealYmd = document.getElementById('dealYmd').value.trim();
  const numRows = document.getElementById('numRows').value;
  if(!lawdCd || !dealYmd) { alert('지역코드와 연월을 입력해주세요'); return; }

  document.getElementById('tableWrap').innerHTML = '<div class="loading">📡 데이터 불러오는 중... 잠시만 기다려주세요</div>';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('signalBox').style.display = 'none';
  document.getElementById('chartBox').style.display = 'none';
  document.getElementById('trendBox').style.display = 'none';

  try {
    // 3개월치 데이터 동시 로딩
    const months = getPrevMonths(dealYmd, 3);
    document.getElementById('tableWrap').innerHTML = `<div class="loading">📡 ${months.join(', ')} 3개월 데이터 분석 중...</div>`;

    const results = await Promise.all(months.map(m => fetchMonth(lawdCd, m, numRows)));
    trendData = {};
    months.forEach((m, i) => { trendData[m] = results[i]; });
    allData = results[results.length - 1]; // 기준월 데이터

    renderSummary(allData);
    renderSignals(allData);
    renderChart(allData);
    renderTrend(months, trendData);
    renderTable(allData);

  } catch(e) {
    document.getElementById('tableWrap').innerHTML = `<div class="loading">❌ 오류: ${e.message}<br>서버가 실행 중인지 확인하세요</div>`;
  }
}

function renderSummary(data) {
  const prices = data.map(d => d.dealAmount).filter(p => p > 0);
  const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
  const max = Math.max(...prices);
  const signals = data.filter(d => d.dealAmount >= avg * 1.5);
  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-avg').textContent = avg.toLocaleString();
  document.getElementById('s-max').textContent = max.toLocaleString();
  document.getElementById('s-signal').textContent = signals.length;
  document.getElementById('summary').style.display = 'grid';
  return { avg, max, signals };
}

function renderSignals(data) {
  const prices = data.map(d => d.dealAmount).filter(p => p > 0);
  const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
  const signals = data.filter(d => d.dealAmount >= avg * 1.5).sort((a,b) => b.dealAmount - a.dealAmount);
  if(signals.length === 0) return;
  document.getElementById('signalList').innerHTML = signals.map(d => `
    <div class="signal-item">
      <div class="signal-apt">🔴 ${d.aptNm}</div>
      <div class="signal-info">${d.umdNm} · ${d.dealAmountStr}만원 · ${d.area}㎡ · ${d.floor}층 · ${d.dealYear}.${d.dealMonth}.${d.dealDay} · 평균 대비 ${Math.round(d.dealAmount/avg*100)}%</div>
    </div>`).join('');
  document.getElementById('signalBox').style.display = 'block';
}

function renderChart(data) {
  const aptMax = {};
  data.forEach(d => { if(!aptMax[d.aptNm] || d.dealAmount > aptMax[d.aptNm]) aptMax[d.aptNm] = d.dealAmount; });
  const top10 = Object.entries(aptMax).sort((a,b) => b[1]-a[1]).slice(0,10);
  const chartMax = top10[0]?.[1] || 1;
  document.getElementById('barChart').innerHTML = top10.map(([name, val]) => {
    const pct = Math.round((val/chartMax)*100);
    return `<div class="bar-row">
      <div class="bar-name" title="${name}">${name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"><span class="bar-val">${val.toLocaleString()}</span></div></div>
    </div>`;
  }).join('');
  document.getElementById('chartBox').style.display = 'block';
}

function renderTrend(months, trendData) {
  const tabs = document.getElementById('monthTabs');
  tabs.innerHTML = months.map((m, i) => `
    <div class="month-tab ${i===months.length-1?'active':''}" onclick="showTrend('${m}', this)">${m.substring(0,4)}년 ${parseInt(m.substring(4,6))}월</div>
  `).join('');

  showTrend(months[months.length-1], tabs.lastElementChild);
  document.getElementById('trendBox').style.display = 'block';
}

function showTrend(ym, el) {
  document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const data = trendData[ym] || [];
  if(data.length === 0) { document.getElementById('trendChart').innerHTML = '<div style="color:#888;font-size:13px">해당 월 데이터가 없습니다</div>'; return; }
  const aptMax = {};
  data.forEach(d => { if(!aptMax[d.aptNm] || d.dealAmount > aptMax[d.aptNm]) aptMax[d.aptNm] = d.dealAmount; });
  const top10 = Object.entries(aptMax).sort((a,b) => b[1]-a[1]).slice(0,10);
  const chartMax = top10[0]?.[1] || 1;
  const prices = data.map(d => d.dealAmount).filter(p => p > 0);
  const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
  document.getElementById('trendChart').innerHTML = `
    <p style="font-size:12px;color:#888;margin-bottom:12px">총 ${data.length}건 · 평균 ${avg.toLocaleString()}만원</p>
    ${top10.map(([name, val]) => {
      const pct = Math.round((val/chartMax)*100);
      return `<div class="bar-row">
        <div class="bar-name" title="${name}">${name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"><span class="bar-val">${val.toLocaleString()}</span></div></div>
      </div>`;
    }).join('')}`;
}

function renderTable(data) {
  const prices = data.map(d => d.dealAmount).filter(p => p > 0);
  const avg = Math.round(prices.reduce((a,b) => a+b, 0) / prices.length);
  const sorted = [...data].sort((a,b) => b.dealAmount - a.dealAmount);
  document.getElementById('tableWrap').innerHTML = `
    <div class="table-wrap">
      <div class="table-header"><span>전체 거래 내역</span><span>${data.length}건</span></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>아파트명</th><th>법정동</th><th>거래가(만원)</th><th>전용(㎡)</th><th>층</th><th>거래일</th><th>건축연도</th><th>신호</th></tr></thead>
          <tbody>
            ${sorted.map(d => {
              let tag, tagClass;
              if(d.dealAmount >= avg*1.5){tag='🔴 급등';tagClass='tag-high';}
              else if(d.dealAmount >= avg*1.2){tag='🟡 주목';tagClass='tag-mid';}
              else{tag='⚪ 일반';tagClass='tag-normal';}
              return `<tr>
                <td style="font-weight:700">${d.aptNm}</td>
                <td style="color:#2f6bc8">${d.umdNm}</td>
                <td style="color:#c84b2f;font-weight:700">${d.dealAmountStr}</td>
                <td style="color:#888">${d.area}</td>
                <td style="color:#888">${d.floor}층</td>
                <td style="color:#888;font-size:11px">${d.dealYear}.${d.dealMonth}.${d.dealDay}</td>
                <td style="color:#888;font-size:11px">${d.buildYear}년</td>
                <td><span class="tag ${tagClass}">${tag}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}
</script>
</body>
</html>
